name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # OIDC token for NuGet.org Trusted Publishing

jobs:
  github-release:
    name: Create GitHub Release And Publish NuGet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore VerificahubNet.sln

      - name: Build
        run: dotnet build VerificahubNet.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test VerificahubNet.sln --configuration Release --no-build --verbosity normal

      - name: Pack Package
        run: dotnet pack src/VerificahubNet/VerificahubNet.csproj --configuration Release --no-build --output artifacts/packages

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists; uploading/refreshing assets."
            gh release upload "$TAG_NAME" artifacts/packages/* --clobber
          else
            args=(
              artifacts/packages/*
              --title "VerificahubNet ${TAG_NAME#v}"
              --generate-notes
              --verify-tag
            )

            if [[ "$TAG_NAME" == *-* ]]; then
              args+=(--prerelease)
            fi

            gh release create "$TAG_NAME" "${args[@]}"
          fi

      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish NuGet Packages
        run: |
          for package in artifacts/packages/*.nupkg; do
            dotnet nuget push "$package" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
              --skip-duplicate
          done

      - name: Publish NuGet Symbols
        run: |
          for package in artifacts/packages/*.snupkg; do
            dotnet nuget push "$package" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
              --skip-duplicate
          done
