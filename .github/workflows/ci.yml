name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-test-pack:
    name: Build, Test, Pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore VerificahubNet.sln

      - name: Build
        run: dotnet build VerificahubNet.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test VerificahubNet.sln --configuration Release --no-build --verbosity normal

      - name: Pack Package
        run: dotnet pack src/VerificahubNet/VerificahubNet.csproj --configuration Release --no-build --output artifacts/packages

      - name: Upload Packages
        uses: actions/upload-artifact@v5
        with:
          name: packages
          path: artifacts/packages/*
