name: Publish NuGet

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git ref to publish from, for example v0.1.0-preview.1'
        required: true
        type: string
      version:
        description: 'Package version to publish, for example 0.1.0-preview.1'
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # OIDC token for NuGet.org Trusted Publishing

jobs:
  publish:
    name: Publish NuGet Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore VerificahubNet.sln

      - name: Build
        run: dotnet build VerificahubNet.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test VerificahubNet.sln --configuration Release --no-build --verbosity normal

      - name: Pack Requested Version
        run: >
          dotnet pack src/VerificahubNet/VerificahubNet.csproj
          --configuration Release
          --no-build
          --output artifacts/packages
          -p:PackageVersion=${{ inputs.version }}
          -p:Version=${{ inputs.version }}
          -p:InformationalVersion=${{ inputs.version }}

      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish Package
        run: >
          dotnet nuget push artifacts/packages/VerificahubNet.${{ inputs.version }}.nupkg
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --skip-duplicate

      - name: Publish Symbols
        run: >
          dotnet nuget push artifacts/packages/VerificahubNet.${{ inputs.version }}.snupkg
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --skip-duplicate
